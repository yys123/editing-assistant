<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>富文本序号补全工具</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #202124;
      background: #f6f7f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .hint {
      margin: 0 0 20px;
      color: #5f6368;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .panel {
      background: #fff;
      border: 1px solid #dfe3e8;
      border-radius: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 10px 12px;
      border-bottom: 1px solid #e8eaed;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid #cfd4dc;
      border-radius: 6px;
      background: #fff;
      color: #202124;
      min-height: 32px;
      padding: 0 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      border-color: #1a73e8;
      background: #1a73e8;
      color: #fff;
    }

    button:focus-visible,
    textarea:focus-visible,
    .paste-box:focus-visible {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }

    .paste-box,
    textarea {
      width: 100%;
      min-height: 520px;
      padding: 14px;
      border: 0;
      resize: vertical;
      font: 15px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #fff;
    }

    .paste-box:empty::before {
      content: "在这里粘贴从富文本编辑器复制的内容";
      color: #9aa0a6;
    }

    textarea {
      display: block;
      color: #202124;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      color: #5f6368;
      line-height: 1.5;
    }

    .status.warn {
      color: #b06000;
    }

    @media (max-width: 820px) {
      body {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .paste-box,
      textarea {
        min-height: 320px;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>富文本序号补全工具</h1>
    <p class="hint">从编辑器复制后粘贴到左侧，右侧会输出补全序号后的纯文本。它会优先读取剪贴板里的 HTML 结构。</p>

    <section class="grid">
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">粘贴区域</h2>
          <div class="actions">
            <button id="clearInput" type="button">清空</button>
            <button id="loadSample" type="button">载入示例</button>
          </div>
        </div>
        <div id="pasteBox" class="paste-box" contenteditable="true" aria-label="粘贴区域"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">纯文本结果</h2>
          <div class="actions">
            <button id="copyOutput" class="primary" type="button">复制结果</button>
          </div>
        </div>
        <textarea id="output" aria-label="纯文本结果" readonly></textarea>
      </div>
    </section>

    <div id="status" class="status" role="status"></div>
  </main>

  <script>
    const pasteBox = document.querySelector("#pasteBox");
    const output = document.querySelector("#output");
    const statusEl = document.querySelector("#status");

    const sampleHtml = `
      <h2 data-section-index="1">1</h2>
      <h3 data-section-index="2">2</h3>
      <p data-orderedlist-index="1">3</p>
      <p data-orderedlist-index="2">4</p>
      <p data-orderedlist-index="3">5</p>
      <h2 data-section-index="1">6</h2>
      <p data-orderedlist-index="5">7</p>
      <p data-orderedlist-index="6">8</p>
      <p>&nbsp;</p>
      <ul>
        <li>无序列表</li>
        <li>无序列表1</li>
      </ul>
      <ol>
        <li>有序列表</li>
        <li>有序列表</li>
      </ol>
      <ul data-checked-list>
        <li><input type="checkbox"> todo list</li>
        <li><input type="checkbox"> todo list</li>
      </ul>
    `;

    function chineseNumber(num) {
      const digits = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
      if (num <= 10) return num === 10 ? "十" : digits[num];
      if (num < 20) return `十${digits[num - 10]}`;
      if (num < 100) {
        const ten = Math.floor(num / 10);
        const one = num % 10;
        return `${digits[ten]}十${one ? digits[one] : ""}`;
      }
      return String(num);
    }

    function alphaNumber(num) {
      let n = num;
      let text = "";
      while (n > 0) {
        n -= 1;
        text = String.fromCharCode(97 + (n % 26)) + text;
        n = Math.floor(n / 26);
      }
      return text || "a";
    }

    function romanNumber(num) {
      const map = [
        [1000, "M"], [900, "CM"], [500, "D"], [400, "CD"],
        [100, "C"], [90, "XC"], [50, "L"], [40, "XL"],
        [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]
      ];
      let n = num;
      let text = "";
      for (const [value, symbol] of map) {
        while (n >= value) {
          text += symbol;
          n -= value;
        }
      }
      return text || "I";
    }

    function sectionPrefix(level, count) {
      if (level === 1) return `${chineseNumber(count)}、`;
      if (level === 2) return `(${chineseNumber(count)})`;
      if (level === 3) return `${count}、`;
      return `${count}.`;
    }

    function orderedPrefix(styleIndex, count) {
      const styles = {
        "1": `${count}、`,
        "2": `(${count})`,
        "3": `${count})`,
        "4": `${count}.`,
        "5": `${alphaNumber(count)}.`,
        "6": `${romanNumber(count)}.`
      };
      return styles[styleIndex] || `${count}.`;
    }

    function cleanText(node) {
      return (node.textContent || "")
        .replace(/\u00a0/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isBlockElement(node) {
      return /^(ADDRESS|ARTICLE|ASIDE|BLOCKQUOTE|DIV|DL|FIELDSET|FIGCAPTION|FIGURE|FOOTER|FORM|H[1-6]|HEADER|HR|LI|MAIN|NAV|OL|P|PRE|SECTION|TABLE|UL)$/i.test(node.nodeName);
    }

    function parseHtmlToText(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const lines = [];
      const sectionCounters = {};
      const orderedCounters = {};

      function appendLine(text) {
        lines.push(text);
      }

      function walk(node, listContext = null) {
        if (node.nodeType !== Node.ELEMENT_NODE) return;

        if (node.matches("script, style, meta, link")) return;

        if (node.matches("ul, ol")) {
          const ordered = node.matches("ol");
          const items = Array.from(node.children).filter((child) => child.matches("li"));
          items.forEach((item, index) => {
            const checked = item.querySelector('input[type="checkbox"]');
            const text = cleanText(item);
            if (!text) return;
            if (checked) {
              appendLine(`${checked.checked ? "[x]" : "[ ]"} ${text}`);
              return;
            }
            appendLine(`${ordered ? `${index + 1}.` : "•"} ${text}`);
          });
          return;
        }

        const sectionIndex = node.getAttribute("data-section-index");
        const orderedIndex = node.getAttribute("data-orderedlist-index");
        const text = cleanText(node);

        if (sectionIndex && text) {
          const level = Number(sectionIndex);
          sectionCounters[level] = (sectionCounters[level] || 0) + 1;
          Object.keys(sectionCounters).forEach((key) => {
            if (Number(key) > level) sectionCounters[key] = 0;
          });
          appendLine(`${sectionPrefix(level, sectionCounters[level])} ${text}`);
          return;
        }

        if (orderedIndex && text) {
          orderedCounters[orderedIndex] = (orderedCounters[orderedIndex] || 0) + 1;
          appendLine(`${orderedPrefix(orderedIndex, orderedCounters[orderedIndex])} ${text}`);
          return;
        }

        if (node.children.length) {
          Array.from(node.children).forEach((child) => walk(child, listContext));
          return;
        }

        if (text && isBlockElement(node)) appendLine(text);
      }

      Array.from(doc.body.children).forEach((child) => walk(child));
      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function updateFromHtml(html) {
      pasteBox.innerHTML = html;
      const result = parseHtmlToText(html);
      output.value = result;
      setStatus(result ? "已根据 HTML 结构补全序号。" : "没有解析到可输出的文本。");
    }

    pasteBox.addEventListener("paste", (event) => {
      event.preventDefault();
      const data = event.clipboardData;
      const html = data.getData("text/html");
      const plain = data.getData("text/plain");

      if (html) {
        updateFromHtml(html);
        return;
      }

      pasteBox.textContent = plain;
      output.value = plain;
      setStatus("这次粘贴只包含纯文本，隐藏的序号结构已经不可见，无法可靠补全。", "warn");
    });

    pasteBox.addEventListener("input", () => {
      const html = pasteBox.innerHTML;
      output.value = parseHtmlToText(html);
      setStatus(output.value ? "已更新纯文本结果。" : "");
    });

    document.querySelector("#clearInput").addEventListener("click", () => {
      pasteBox.innerHTML = "";
      output.value = "";
      setStatus("");
      pasteBox.focus();
    });

    document.querySelector("#loadSample").addEventListener("click", () => {
      updateFromHtml(sampleHtml);
    });

    document.querySelector("#copyOutput").addEventListener("click", async () => {
      if (!output.value) {
        setStatus("当前没有可复制的结果。", "warn");
        return;
      }
      await navigator.clipboard.writeText(output.value);
      alert("结果已复制");
      setStatus("结果已复制。");
    });
  </script>
</body>

</html>
